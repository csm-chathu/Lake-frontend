name: Build and Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Deploy to Namecheap via Rsync
        uses: Burnett01/rsync-deployments@7.0.0
        with:
          switches: -avzr --delete
          path: ./dist/
          remote_path: /home/lmucunal/public_html
          remote_host: ${{ secrets.FTP_HOST }}       # Matched to your screenshot
          remote_user: ${{ secrets.FTP_USERNAME }}   # Matched to your screenshot
          remote_port: 21098
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }} # Matched to your screenshot
