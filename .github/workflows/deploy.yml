name: Build and Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies
      - name: Install dependencies
        run: npm ci || npm install

      # Build project
      - name: Build
        run: npm run build

      # Debug (optional, shows build output)
      - name: Show build output
        run: |
          echo "Root files:"
          ls -la
          echo "Dist output:"
          ls -la dist || echo "dist folder missing"

# Deploy to Namecheap via SFTP (SSH)
      - name: Deploy to Namecheap via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098 # The port you used in CMD
          local_path: './dist/*'
          remote_path: '/home/lmucunal/public_html' # Verify this path in your SSH terminal
          delete_remote_files: false
